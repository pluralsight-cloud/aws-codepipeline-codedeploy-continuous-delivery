version: 0.0
os: linux

files:
  - source: /
    destination: /opt/globomantics-app

permissions:
  - object: /opt/globomantics-app
    owner: ec2-user
    group: ec2-user
    mode: "755"
    type:
      - directory
      - file

hooks:
  ApplicationStop:
    - location: scripts/stop_server.sh
      timeout: 30
      runas: ec2-user

  AfterInstall:
    - location: scripts/install_dependencies.sh
      timeout: 120
      runas: root

  ApplicationStart:
    - location: scripts/start_server.sh
      timeout: 30
      runas: ec2-user

  ValidateService:
    - location: scripts/validate_service.sh
      timeout: 30
      runas: ec2-user
