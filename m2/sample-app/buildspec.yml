version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Install phase started"
      - npm install --omit=dev
  build:
    commands:
      - echo "Build phase started on $(date)"
      - echo "Preparing deployable artifact for CodeDeploy"
  post_build:
    commands:
      - echo "Build completed on $(date)"

artifacts:
  files:
    - app.js
    - package.json
    - appspec.yml
    - scripts/**/*
  discard-paths: no
